<style>

  --green:#16a34a;

}
[data-theme="dark"]{
  --bg:#0b1220;
  --surface:#131a2b;
  --surface-2:#1c2438;
  --text:#e6eaf2;
  --text-soft:#9aa6bd;
  --border:#27314a;
  --blue:#60a5fa;
  --blue-soft:#1e3a8a;
  --green:#4ade80;
  --green-soft:#14532d;
  --red:#f87171;
  --red-soft:#7f1d1d;
  --yellow:#facc15;

  --accent:#a78bfa;

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{min-height:100vh;min-height:100dvh;overflow-x:hidden}
#app{max-width:880px;margin:0 auto;padding:16px 16px 80px}
header.appbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 6px 16px;position:sticky;top:0;background:linear-gradient(to bottom,var(--bg) 80%,transparent);z-index:10}
.logo{font-weight:800;font-size:18px;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px}

.input{width:100%;padding:14px;border-radius:12px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;font-weight:600;outline:none}

.kbd{display:inline-block;padding:2px 6px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
.center{text-align:center}
.weak-list{margin-top:10px}
.weak-list .item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface-2);border-radius:10px;margin-bottom:6px}

</style>

<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div id="points" class="points-anim">+10</div>

<script>
"use strict";

/* =========================================================
   GRUNDKURS 26A – DEUTSCH LERNTRAINER
   Single-file static web app.
   Hinweis fuer spaeteres echtes Online-Leaderboard:
   Statt localStorage in saveLeaderboardEntry() einfach
   fetch('https://DEIN-PROJEKT.supabase.co/...') aufrufen.
   Tabelle: scores(id, name, score, total, percent, ts).
   Mit anon-Key und Row-Level-Policy (INSERT only) absichern.
   ========================================================= */

/* ---------------- STATE & STORAGE ---------------- */
const STORE_KEY = "gk26a_state_v1";
const defaultState = {
  nickname:"",
  mode:"einzel",
  theme:"light",
  points:0,
  progress:{},     // moduleId -> {best, completed, stars, attempts, wrong:[{idx,q,correct,picked}]}
  bossHistory:[],  // [{score,total,percent,grade,date,weak:{moduleId:rate}}]
  leaderboard:[]   // [{name,score,total,percent,date,grade}]
};

let state = loadState();
function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return structuredClone(defaultState);
    const parsed = JSON.parse(raw);
    return Object.assign(structuredClone(defaultState), parsed);
  }catch(e){ return structuredClone(defaultState); }
}
function saveState(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}
function resetAll(){
  if(!confirm("Wirklich alle Fortschritte loeschen?")) return;
  state = structuredClone(defaultState);
  saveState();
  applyTheme();
  renderStart();
}

/* ---------------- THEME ---------------- */
function applyTheme(){
  document.documentElement.setAttribute("data-theme", state.theme === "dark" ? "dark" : "light");
}
function toggleTheme(){
  state.theme = state.theme === "dark" ? "light" : "dark";
  applyTheme();
  saveState();
}

/* ---------------- HELPERS ---------------- */
function $(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }
function el(tag, attrs={}, ...children){
  const e=document.createElement(tag);
  for(const k in attrs){
    if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.substring(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for(const c of children){
    if(c==null) continue;
    if(typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}
function clearApp(){ document.getElementById("app").innerHTML=""; }
function mount(node){ document.getElementById("app").appendChild(node); }
function toast(msg, ms=1600){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove("show"), ms);
}
function pointsAnim(text){
  const el=document.getElementById("points");
  el.textContent=text;
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function gradeCH(percent){
  let g = 1 + 5*percent/100;
  g = Math.round(g*10)/10;
  return g < 1 ? 1 : g > 6 ? 6 : g;
}

/* ---------------- EXERCISE BUILDER ---------------- */
/*
   Types:
     mc        -> multiple choice  (correct = index of correct option)
     click     -> click ONE word in sentence  (correct = index of word)
     multiclick-> click MULTIPLE words        (correct = array of indices)
     trans     -> multiple choice for transformation (Aktiv/Passiv)
   Each exercise:
     { type, q (question), s (sentence, optional), options, correct, e (explanation), r (rule), m (merksatz), tip (hint) }
   For click/multiclick, "s" is tokenised by whitespace; punctuation is glued to the previous word visually.
*/

/* Helper: split a sentence into clickable tokens.
   Punctuation (. , ! ?) becomes its own non-clickable token. */
function tokenize(s){
  const out=[];
  s.split(/\s+/).forEach((w,i,arr)=>{
    const m = w.match(/^(.*?)([.,!?;:]+)?$/);
    const base = m[1];
    const punct = m[2];
    if(base) out.push({text:base, clickable:true});
    if(punct) out.push({text:punct, clickable:false});
  });
  return out;
}

/* ---------------- EXERCISE DATA ---------------- */

const MOD_WORTARTEN = {
  id:"wortarten",
  name:"Wortarten",
  icon:"W",
  color:"#2563eb",
  desc:"Verb, Nomen, Adjektiv, Pronomen, Partikel",
  exercises:[
    {type:"click", q:"Klicke das VERB an.",
     s:"Der Hund bellt im Garten laut.",
     correct:1,
     e:'"bellt" ist die Taetigkeit im Satz.',
     r:"Verben druecken eine Taetigkeit oder einen Zustand aus.",
     m:"VERB = was etwas tut oder ist."},
    {type:"click", q:"Klicke das ADJEKTIV an.",
     s:"Das alte Haus steht leer.",
     correct:1,
     e:'"alte" beschreibt das Nomen "Haus".',
     r:"Adjektive beschreiben Nomen und koennen dekliniert werden.",
     m:"ADJEKTIV = wie ist etwas?"},
    {type:"mc", q:'Welche Wortart ist "und"?',
     options:["Verb","Nomen","Pronomen","Partikel"],
     correct:3,
     e:'"und" verbindet und kann nicht gebeugt werden.',
     r:"Partikeln sind unveraenderlich (Konjunktionen, Praepositionen, Adverbien, Interjektionen).",
     m:"PARTIKEL = aendert sich nie."},
    {type:"mc", q:'Welche Wortart ist "dieser" in "Dieser Schueler liest"?',
     options:["Adjektiv","Pronomen","Nomen","Partikel"],
     correct:1,
     e:'"dieser" steht hier als Begleiter vor dem Nomen.',
     r:"Pronomen koennen Stellvertreter ODER Begleiter eines Nomens sein.",
     m:"PRONOMEN = ersetzt oder begleitet ein Nomen."},
    {type:"click", q:"Klicke das NOMEN an.",
     s:"Die Lehrerin erklaert geduldig.",
     correct:1,
     e:'"Lehrerin" wird grossgeschrieben und hat ein Genus.',
     r:"Nomen haben Genus, Numerus, Kasus und werden grossgeschrieben.",
     m:"NOMEN = Ding, Person, Idee."},
    {type:"mc", q:'Welche Wortart ist "sehr"?',
     options:["Adjektiv","Partikel","Pronomen","Verb"],
     correct:1,
     e:'"sehr" laesst sich nicht beugen ("ein sehres" geht nicht).',
     r:"Wenn ein Wort nicht dekliniert oder konjugiert werden kann, ist es eine Partikel.",
     m:"Test: nicht beugbar = Partikel."},
    {type:"click", q:"Klicke das PRONOMEN an.",
     s:"Sie liest dieses Buch sehr aufmerksam.",
     correct:0,
     e:'"Sie" ersetzt eine Person und steht stellvertretend.',
     r:"Personalpronomen sind Stellvertreter eines Nomens.",
     m:"PRONOMEN als Stellvertreter steht ALLEIN."},
    {type:"multiclick", q:"Klicke ALLE Nomen an.",
     s:"Der Lehrer gibt dem Schueler ein neues Buch.",
     correct:[1,3,6],
     e:'"Lehrer", "Schueler" und "Buch" sind alle Nomen.',
     r:"Nomen werden im Deutschen immer grossgeschrieben.",
     m:"Grossgeschrieben = oft Nomen."},
    {type:"mc", q:'Welche Wortart ist "lesen"?',
     options:["Verb","Nomen","Adjektiv","Partikel"],
     correct:0,
     e:'"lesen" ist die Grundform einer Taetigkeit.',
     r:"Infinitive sind Verben in ihrer Grundform.",
     m:"Endung -en oder -n = oft Verb."},
    {type:"click", q:"Klicke die PARTIKEL an.",
     s:"Er kam gestern nach Hause.",
     correct:1,
     e:'"gestern" ist ein Zeit-Adverb und nicht beugbar.',
     r:"Adverbien gehoeren zu den Partikeln.",
     m:"Adverbien sind Partikeln."}
  ]
};

const MOD_PPA = {
  id:"ppa",
  name:"Pronomen, Partikeln, Adjektive",
  icon:"P",
  color:"#0ea5e9",
  desc:"Funktion, Stellung, Art bestimmen",
  exercises:[
    {type:"mc", q:'"Er liest." - Welche Rolle hat das Pronomen "Er"?',
     options:["Stellvertreter","Begleiter","Adjektiv","Partikel"],
     correct:0,
     e:'"Er" steht alleine fuer eine Person.',
     r:"Pronomen ohne Nomen daneben = Stellvertreter.",
     m:"Alleine = Stellvertreter."},
    {type:"mc", q:'"Dieser Schueler liest." - Welche Rolle hat "Dieser"?',
     options:["Stellvertreter","Begleiter","Adverb","Konjunktion"],
     correct:1,
     e:'"Dieser" steht vor dem Nomen "Schueler".',
     r:"Pronomen mit Nomen dahinter = Begleiter.",
     m:"Mit Nomen = Begleiter."},
    {type:"mc", q:'Welche Art Pronomen ist "mein" in "mein Buch"?',
     options:["Personalpronomen","Possessivpronomen","Reflexivpronomen","Relativpronomen"],
     correct:1,
     e:'"mein" zeigt Besitz an.',
     r:"Possessivpronomen druecken Zugehoerigkeit aus.",
     m:"Besitz = Possessiv."},
    {type:"mc", q:'Welche Art Pronomen ist "der" in "Der Mann, der lacht"?',
     options:["Personalpronomen","Possessivpronomen","Relativpronomen","Demonstrativpronomen"],
     correct:2,
     e:'"der" leitet einen Relativsatz ein und bezieht sich auf "Mann".',
     r:"Relativpronomen leiten Relativsaetze ein und beziehen sich auf ein Nomen davor.",
     m:"Im Relativsatz = Relativpronomen."},
    {type:"mc", q:'Stellung des Adjektivs in "Das schnelle Auto faehrt"?',
     options:["attributiv (vor Nomen)","praedikativ (nach Verb)","nominalisiert","adverbial"],
     correct:0,
     e:'"schnelle" steht vor dem Nomen und wird dekliniert.',
     r:"Attributive Adjektive stehen vor dem Nomen und werden gebeugt.",

/* ---------------- MODULE SESSION ---------------- */

let session = null;

function startModule(modId, examMode){
  const m = MODULES.find(x=>x.id===modId);
  if(!m) return;
  const order = shuffle(m.exercises.map((_,i)=>i));
  session = {
    kind:"module",
    modId,
    examMode,
    exercises:m.exercises,
    order,
    idx:0,
    correct:0,
    wrong:[],
    answered:false
  };
  renderExercise();
}

function startRepeat(){
  const allWrong = [];
  MODULES.forEach(m=>{
    const prog = state.progress[m.id];
    if(prog && prog.wrong){
      prog.wrong.forEach(w=>{ allWrong.push({modId:m.id, exIdx:w.idx}); });
    }
  });
  if(allWrong.length===0){ toast("Keine falschen Aufgaben gespeichert."); return; }
  // Limit to 15
  const picked = shuffle(allWrong).slice(0,15);
  session = {
    kind:"repeat",
    items:picked,
    idx:0,
    correct:0,
    answered:false
  };
  renderExercise();
}

function startBoss(){
  const items = [];
  BOSS_PLAN.forEach(plan=>{
    const m = MODULES.find(x=>x.id===plan.mod);
    const order = shuffle(m.exercises.map((_,i)=>i)).slice(0,plan.n);
    order.forEach(i => items.push({modId:plan.mod, exIdx:i}));
  });
  session = {
    kind:"boss",
    items: shuffle(items),
    idx:0,
    correct:0,
    wrongByMod:{},
    answered:false
  };
  renderExercise();
}

function currentExercise(){
  if(session.kind==="module"){
    const i = session.order[session.idx];
    return {ex: session.exercises[i], modId: session.modId, exIdx:i};
  }else{
    const it = session.items[session.idx];
    const m = MODULES.find(x=>x.id===it.modId);
    return {ex: m.exercises[it.exIdx], modId: it.modId, exIdx: it.exIdx};
  }
}

function totalCount(){
  if(session.kind==="module") return session.order.length;
  return session.items.length;
}

function renderRepeat(){ startRepeat(); }

function renderExercise(){
  clearApp();
  applyTheme();
  const root = document.getElementById("app");
  root.appendChild(renderHeader(false));

  const total = totalCount();
  const i = session.idx;
  const {ex, modId} = currentExercise();
  const mod = MODULES.find(x=>x.id===modId);

  // header card
  const head = el("div",{class:"card"},
    el("div",{class:"flex-between"},
      el("div",{},
        el("span",{class:"tag blue"}, session.kind==="boss"?"BOSS":session.kind==="repeat"?"REPEAT":(mod?mod.name:"")),
        el("span",{style:"margin-left:6px"}, (i+1) + " / " + total)
      ),
      el("button",{class:"btn small ghost", onclick:()=>{
        if(confirm("Wirklich abbrechen?")) renderHome();
      }}, "Abbrechen")
    ),
    el("div",{class:"progress-track"},
      el("div",{class:"progress-fill", style:"width:"+Math.round((i)/total*100)+"%"})
    )
  );
  mount(head);

  // exercise card
  const card = el("div",{class:"card exercise"});
  card.appendChild(el("div",{class:"question"}, ex.q));

  // Hint button (Lernmodus only)
  if(!session.examMode && session.kind!=="boss"){
    const hint = el("div",{class:"hint"});
    if(ex.tip) hint.textContent = "Tipp: " + ex.tip;
    else hint.textContent = "Tipp: " + ex.m;
    card.appendChild(el("button",{class:"hint-btn", onclick:()=>{ hint.classList.toggle("show"); }}, "Tipp anzeigen"));
    card.appendChild(hint);
  }

  // Body by type
  let answerArea = null;
  if(ex.type === "mc" || ex.type === "trans"){
    answerArea = renderMC(ex, card);
  }else if(ex.type === "click"){
    answerArea = renderClick(ex, card, false);
  }else if(ex.type === "multiclick"){
    answerArea = renderClick(ex, card, true);
  }else{
    card.appendChild(el("div",{}, "Unbekannter Typ."));
  }

  mount(card);
}

function renderMC(ex, card){
  const wrap = el("div",{class:"options"});
  const buttons = [];
  ex.options.forEach((opt, idx)=>{
    const b = el("button",{class:"option", onclick:()=>{
      if(session.answered) return;
      session.answered = true;
      const correct = (idx === ex.correct);
      buttons.forEach((bb,bi)=>{
        bb.classList.add(bi === ex.correct ? "correct" : (bi===idx && !correct ? "wrong" : ""));
        bb.disabled = true;
      });
      finishAnswer(correct, ex, card);
    }}, opt);
    buttons.push(b);
    wrap.appendChild(b);
  });
  card.appendChild(wrap);
  return wrap;
}

function renderClick(ex, card, multi){
  const tokens = tokenize(ex.s);
  // Map clickable index from word position considering punctuation tokens are also in array
  // ex.correct is the clickable index (skipping punct)
  const clickableIndexMap = []; // clickableIndexMap[i] = token index in tokens
  tokens.forEach((t,ti)=>{
    if(t.clickable) clickableIndexMap.push(ti);
  });
  const zone = el("div",{class:"word-zone"});
  const wordEls = [];
  tokens.forEach((t, ti)=>{
    if(!t.clickable){
      const sp = el("span",{class:"word punct"}, t.text);
      zone.appendChild(sp);
      wordEls.push(null);
      return;
    }
    const w = el("span",{class:"word"}, t.text);
    wordEls.push(w);
    const clickableIdx = clickableIndexMap.indexOf(ti);
    w.dataset.idx = clickableIdx;
    w.addEventListener("click", ()=>{
      if(session.answered) return;
      if(multi){
        w.classList.toggle("selected");
      }else{
        // single click -> immediate evaluate
        session.answered = true;
        const correct = (clickableIdx === ex.correct);
        wordEls.forEach((we, wi)=>{
          if(!we) return;
          const cidx = clickableIndexMap.indexOf(wi);
          we.classList.add("locked");
          if(cidx === ex.correct) we.classList.add("correct");
          else if(cidx === clickableIdx) we.classList.add("wrong");
        });
        finishAnswer(correct, ex, card);
      }
    });
    zone.appendChild(w);
  });
  card.appendChild(zone);

  if(multi){
    const submit = el("button",{class:"btn", onclick:()=>{
      if(session.answered) return;
      session.answered = true;
      const selected = wordEls.map((we, wi)=>{
        if(!we) return null;
        return we.classList.contains("selected") ? clickableIndexMap.indexOf(wi) : null;
      }).filter(x=>x!==null);
      const target = ex.correct.slice().sort((a,b)=>a-b);
      const got = selected.slice().sort((a,b)=>a-b);
      const correct = target.length===got.length && target.every((v,i)=>v===got[i]);
      // visualize
      wordEls.forEach((we, wi)=>{
        if(!we) return;
        const cidx = clickableIndexMap.indexOf(wi);
        we.classList.add("locked");
        if(target.indexOf(cidx)>=0) we.classList.add("correct");
        else if(we.classList.contains("selected")) we.classList.add("wrong");
        we.classList.remove("selected");
      });
      finishAnswer(correct, ex, card);
    }}, "Antwort pruefen");
    card.appendChild(submit);
  }
  return zone;
}

function finishAnswer(correct, ex, card){
  // Feedback
  const fb = el("div",{class:"feedback " + (correct?"correct":"wrong")});
  fb.appendChild(el("div",{class:"head"}, correct ? "Richtig!" : "Leider falsch"));
  // In Pruefungsmodus -> reduzierte Erklaerung? Vorgabe sagt nur "ohne Hilfe" davor.
  // Wir zeigen Erklaerung trotzdem nach der Antwort.
  fb.appendChild(el("div",{class:"row", html:"<b>Warum:</b> " + ex.e}));
  fb.appendChild(el("div",{class:"row", html:"<b>Regel:</b> " + ex.r}));
  fb.appendChild(el("div",{class:"merksatz"}, "Merksatz: " + ex.m));
  card.appendChild(fb);

  // Track
  if(correct){
    session.correct++;
    state.points += 10;
    pointsAnim("+10");
  }else{
    const cur = currentExercise();
    if(session.kind==="module"){
      session.wrong.push({idx: cur.exIdx, q: ex.q});
    }
    if(session.kind==="boss"){
      session.wrongByMod[cur.modId] = (session.wrongByMod[cur.modId]||0)+1;
    }
  }
  saveState();

  const next = el("button",{class:"btn", style:"margin-top:14px", onclick:()=>{
    session.idx++;
    session.answered=false;
    if(session.idx >= totalCount()){
      finishSession();
    }else{
      renderExercise();
    }
  }}, session.idx+1 >= totalCount() ? "Ergebnis ansehen" : "Naechste Aufgabe");
  card.appendChild(next);
}

function finishSession(){
  if(session.kind==="module") finishModule();
  else if(session.kind==="boss") finishBoss();
  else finishRepeat();
}

function finishModule(){
  const total = session.order.length;
  const correct = session.correct;
  const stars = correct === total ? 3 : correct >= Math.ceil(total*0.8) ? 2 : correct >= Math.ceil(total*0.5) ? 1 : 0;
  const prev = state.progress[session.modId] || {best:0, stars:0, attempts:0, wrong:[]};
  state.progress[session.modId] = {
    best: Math.max(prev.best||0, correct),
    stars: Math.max(prev.stars||0, stars),
    attempts: (prev.attempts||0)+1,
    completed: correct === total ? true : prev.completed,
    wrong: session.wrong.slice(0,30)
  };
  saveState();

  clearApp();
  document.getElementById("app").appendChild(renderHeader(false));
  const mod = MODULES.find(x=>x.id===session.modId);

  const card = el("div",{class:"card"});
  card.appendChild(el("h1",{class:"center"}, "Level abgeschlossen"));
  card.appendChild(el("p",{class:"center"}, mod.name));
  card.appendChild(el("div",{class:"result-hero"},
    el("div",{class:"big"}, correct + " / " + total),
    el("div",{class:"stars-large"}, "*".repeat(stars) + ".".repeat(3-stars))
  ));
  const pct = Math.round(correct/total*100);
  card.appendChild(el("p",{class:"center muted"}, pct + "% richtig"));

  if(session.wrong.length){
    card.appendChild(el("div",{class:"divider"}));
    card.appendChild(el("h3",{}, "Fehler-Wiederholung"));
    const ul = el("ul",{class:"list"});
    session.wrong.forEach(w=> ul.appendChild(el("li",{}, w.q)));
    card.appendChild(ul);
  }

  card.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn", onclick:()=>startModule(session.modId, session.examMode)}, "Nochmal"),
    el("button",{class:"btn secondary", onclick:renderHome}, "Zur Uebersicht")
  ));
  if(session.wrong.length){
    card.appendChild(el("div",{class:"btn-row"},
      el("button",{class:"btn ghost", onclick:startRepeat}, "Falsche wiederholen")
    ));
  }
  mount(card);
}

function finishBoss(){
  const total = session.items.length;
  const correct = session.correct;
  const percent = Math.round(correct/total*100);
  const grade = gradeCH(percent);
  // weak by module
  const weak = {};
  BOSS_PLAN.forEach(p=>{
    const wrong = session.wrongByMod[p.mod] || 0;
    weak[p.mod] = { wrong, total: p.n, rate: Math.round((p.n - wrong)/p.n*100) };
  });
  const entry = {
    name: state.nickname || "Anonym",
    score: correct, total, percent, grade,
    date: new Date().toLocaleString("de-CH"),
    weak
  };
  state.bossHistory.push({score:correct, total, percent, grade, date:entry.date, weak});
  state.leaderboard.push(entry);
  state.leaderboard.sort((a,b)=>b.percent - a.percent);
  state.leaderboard = state.leaderboard.slice(0,20);
  saveState();
  /*
    BACKEND-ANSCHLUSS (Beispiel):
    fetch('https://DEIN-PROJEKT.supabase.co/rest/v1/scores',{
      method:'POST',
      headers:{'apikey':'ANON_KEY','Authorization':'Bearer ANON_KEY','Content-Type':'application/json'},
      body: JSON.stringify({name:entry.name, score:entry.score, percent:entry.percent})
    });
  */

  clearApp();
  document.getElementById("app").appendChild(renderHeader(false));

  const card = el("div",{class:"card"});
  card.appendChild(el("h1",{class:"center"}, "BOSS-PRUEFUNG"));
  card.appendChild(el("div",{class:"result-hero"},
    el("div",{class:"big"}, percent + "%"),
    el("div",{class:"grade", style:"color:var(--blue)"}, "Note " + grade)
  ));
  card.appendChild(el("p",{class:"center muted"}, correct + " von " + total + " Aufgaben richtig"));

  card.appendChild(el("div",{class:"divider"}));
  card.appendChild(el("h3",{}, "Schwaechenanalyse"));
  const wl = el("div",{class:"weak-list"});
  BOSS_PLAN.forEach(p=>{
    const w = weak[p.mod];
    const mod = MODULES.find(x=>x.id===p.mod);
    const row = el("div",{class:"item"});
    row.appendChild(el("div",{}, mod.name));
    const bar = el("div",{class: "bar " + (w.rate>=70?"good":"")});
    bar.appendChild(el("div",{style:"width:"+w.rate+"%"}));
    row.appendChild(bar);
    row.appendChild(el("div",{class:"muted"}, w.rate + "%"));
    wl.appendChild(row);
  });
  card.appendChild(wl);

  // Recommendation
  const weakest = BOSS_PLAN.map(p=>({mod:p.mod, rate:weak[p.mod].rate})).sort((a,b)=>a.rate-b.rate)[0];
  const weakestMod = MODULES.find(x=>x.id===weakest.mod);
  card.appendChild(el("div",{class:"divider"}));
  card.appendChild(el("h3",{}, "Empfehlung"));
  card.appendChild(el("p",{}, "Uebe als Naechstes: ", el("b",{}, weakestMod.name)));

  card.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn", onclick:()=>startModule(weakest.mod,false)}, "Schwaeche jetzt ueben"),
    el("button",{class:"btn secondary", onclick:renderHome}, "Uebersicht")
  ));
  card.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn ghost", onclick:renderLeaderboard}, "Leaderboard"),
    el("button",{class:"btn ghost", onclick:startBoss}, "Boss nochmal")
  ));
  mount(card);
}

function finishRepeat(){
  const total = session.items.length;
  const correct = session.correct;
  clearApp();
  document.getElementById("app").appendChild(renderHeader(false));
  const card = el("div",{class:"card"});
  card.appendChild(el("h1",{class:"center"}, "Wiederholung fertig"));
  card.appendChild(el("div",{class:"result-hero"}, el("div",{class:"big"}, correct + " / " + total)));
  card.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn", onclick:renderHome}, "Zur Uebersicht"),
    el("button",{class:"btn secondary", onclick:startRepeat}, "Nochmal")
  ));
  mount(card);
}

/* ---------------- LEADERBOARD ---------------- */

function renderLeaderboard(){
  clearApp();
  document.getElementById("app").appendChild(renderHeader(true));
  const card = el("div",{class:"card"});
  card.appendChild(el("h1",{}, "Leaderboard"));
  card.appendChild(el("p",{class:"muted"}, "Nur lokal auf diesem Geraet."));
  if(state.leaderboard.length === 0){
    card.appendChild(el("p",{}, "Noch keine Eintraege. Spiele die Boss-Pruefung!"));
  }else{
    const ul = el("ul",{class:"list"});
    state.leaderboard.forEach((e,i)=>{
      ul.appendChild(el("li",{},
        el("div",{}, (i+1) + ". ", el("b",{}, e.name)),
        el("div",{class:"muted"}, e.percent + "% (Note " + e.grade + ") - " + e.date)
      ));
    });
    card.appendChild(ul);
  }
  card.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn", onclick:startBoss}, "Boss starten"),
    el("button",{class:"btn ghost", onclick:()=>{
      if(confirm("Leaderboard auf diesem Geraet leeren?")){ state.leaderboard=[]; saveState(); renderLeaderboard(); }
    }}, "Leeren"),
    el("button",{class:"btn secondary", onclick:renderHome}, "Zurueck")
  ));
  mount(card);
}

/* ---------------- TEACHER ---------------- */

function renderTeacher(){
  clearApp();
  document.getElementById("app").appendChild(renderHeader(true));
  const card = el("div",{class:"card"});
  card.appendChild(el("h1",{}, "Lehreransicht"));
  card.appendChild(el("p",{class:"muted"}, "Uebersicht aller Lernziele und Aufgaben."));
  const ul = el("ul",{class:"list"});
  MODULES.forEach(m=>{
    const prog = state.progress[m.id] || {best:0,stars:0,attempts:0};
    ul.appendChild(el("li",{},
      el("div",{},
        el("b",{}, m.name),
        el("div",{class:"muted"}, m.desc)
      ),
      el("div",{class:"muted"}, m.exercises.length + " Aufgaben - Best: " + (prog.best||0) + " - " + (prog.stars||0) + "*")
    ));
  });
  card.appendChild(ul);
  card.appendChild(el("div",{class:"divider"}));
  card.appendChild(el("h3",{}, "Pruefung"));
  card.appendChild(el("p",{}, "Boss-Pruefung: 30 gemischte Aufgaben (5/4/4/3/4/4/4/2). Notenformel: 1 + 5 * Punkte / Max."));
  card.appendChild(el("div",{class:"btn-row"},
    el("button",{class:"btn", onclick:startBoss}, "Boss-Pruefung starten"),
    el("button",{class:"btn secondary", onclick:renderHome}, "Zurueck")
  ));
  mount(card);
}

/* ---------------- SHARE ---------------- */

function copyLink(){
  const url = location.href.split("#")[0];
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(url).then(()=>{
      toast("Link kopiert! Sende ihn deiner Klasse.");
    }).catch(()=>fallbackCopy(url));
  }else{
    fallbackCopy(url);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position="fixed";
  ta.style.opacity="0";
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); toast("Link kopiert!"); }catch(e){ toast("Bitte URL manuell kopieren."); }
  document.body.removeChild(ta);
}

/* ---------------- INIT ---------------- */
applyTheme();
renderStart();
</script>
